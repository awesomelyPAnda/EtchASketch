<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-A-Sketch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1 class="title">Etch-A-Sketch</h1>
    </header>
    <div class="container">
        <div class="button-container">
            <input type="color" class="color-picker" value="#636059

">
            <button class="btn color-mode">Color</button>
            <button class="btn rainbow-mode">Rainbow</button>
            <button class="btn eraser">Eraser</button>
            <button class="btn clear">Clear</button>
            <div class="range-container">
                <label for"range" class="label">16x16</label>
                <input type="range" min="1" max="81" step="1" id="range" value="16">
                 <output id="output"></output>
            </div>
        </div>
        <div class="grid-container">
            

        </div>
    </div>
    


    
</body>
</html>
